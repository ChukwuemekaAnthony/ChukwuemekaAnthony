// ROOT APP
// ══════════════════════════════════════════════════════════════════════════
function App() {
  const [authState, setAuthState] = useState('idle'); // idle | loading | authenticated | error
  const [account, setAccount] = useState(null);
  const [view, setView] = useState('upload');
  const [loading, setLoading] = useState(false);
  const [loadingMsg, setLoadingMsg] = useState('');
  const [library, setLibrary]       = useState([]);
  const [schema, setSchema]         = useState([]);
  const [libraryMap, setLibraryMap] = useState({ global: new Map(), clients: {} });
  const [valueMappings, setValueMappings] = useState([]);
  const [valueMap, setValueMap]     = useState({});
  const [clientProfiles, setClientProfiles] = useState([]);
  const [session, setSession]       = useState(null);
  const [mappingResults, setMappingResults] = useState([]);
  const [mappingNormLog, setMappingNormLog] = useState([]);
  const [thresholds, setThresholds] = useState({ autoMap:0.9, suggest:0.7, review:0.5, llmEnabled:true });
  const [processingLog, setProcessingLog] = useState([]);
  const toast = useToast();

  // ── Auth init — fully async, no swallowed errors
  useEffect(() => {
    async function initAuth() {
      setAuthState('loading');
      // Wait for msal global to be available (Edge tracking prevention can delay it)
      var attempts = 0;
      while (typeof msal === 'undefined' && attempts < 20) {
        await new Promise(function(r) { setTimeout(r, 100); });
        attempts++;
      }
      if (typeof msal === 'undefined') {
        console.error('MSAL library failed to load');
        setAuthState('idle');
        return;
      }
      try {
        msalInstance = new msal.PublicClientApplication(MSAL_CONFIG);
        await msalInstance.initialize();
        await msalInstance.handleRedirectPromise();
        var accounts = msalInstance.getAllAccounts();
        if (accounts.length > 0) {
          setAccount(accounts[0]);
          setAuthState('authenticated');
        } else {
          setAuthState('idle');
        }
      } catch(e) {
        console.error('Auth init failed:', e);
        setAuthState('idle');
      }
    }
    initAuth();
  }, []);

  // ── Load data on auth
  useEffect(() => {
    if (authState === 'authenticated') loadData();
  }, [authState]);

  async function loadData() {
    setLoading(true); setLoadingMsg('Loading mapping library…');
    try {
      setLoadingMsg('Loading field mappings…');
      const [lib, sch, vm, cp, pl] = await Promise.all([
        loadTable('FieldMappings'),
        loadTable('InternalSchema'),
        loadTable('ValueMappings').catch(function() { return []; }),
        loadTable('ClientProfiles').catch(function() { return []; }),
        loadTable('ProcessingLog').catch(function() { return []; }),
      ]);
      setLibrary(lib);
      setSchema(sch);
      setLibraryMap(buildLibraryMap(lib));
      setValueMappings(vm);
      setValueMap(buildValueMap(vm));
      setClientProfiles(cp);
      setProcessingLog(pl);
      setLoadingMsg('');
    } catch(e) {
      toast.add('Failed to load data from OneDrive: ' + e.message, 'error');
    }
    setLoading(false);
  }

  async function handleSignIn() {
    try {
      if (typeof msal === 'undefined') {
        toast.add('Microsoft auth library not loaded — check your connection and reload', 'error');
        return;
      }
      if (!msalInstance) {
        msalInstance = new msal.PublicClientApplication(MSAL_CONFIG);
        await msalInstance.initialize();
      }
      var res = await msalInstance.loginPopup({ scopes: SCOPES });
      setAccount(res.account);
      setAuthState('authenticated');
    } catch(e) {
      console.error('Sign-in error:', e);
      toast.add('Sign-in failed: ' + (e.message || 'please try again'), 'error');
    }
  }

  function handleSignOut() {
    if (msalInstance) msalInstance.logoutPopup();
    setAccount(null); setAuthState('idle');
  }

  // ── Process document
  function handleProcess(sessionData) {
    setSession(Object.assign({}, sessionData, { outputSaved: false }));
    setView('review');
  }

  // ── Confirm a single mapping → write to OneDrive + update local library
  var _lastGraphWrite = 0; // Throttle guard — prevents Graph 429 on rapid bulk confirm
  async function handleConfirmMapping(row) {
    // Enforce 150ms minimum between OneDrive writes
    var now = Date.now();
    var gap = now - _lastGraphWrite;
    if (gap < 150) await new Promise(function(r) { setTimeout(r, 150 - gap); });
    _lastGraphWrite = Date.now();
    const today = new Date().toISOString().slice(0,10);
    const userName = (account && account.name) || (account && account.username) || 'User';
    const newRow = {
      SourceField: row.sourceField,
      InternalField: row.internalField,
      Confidence: 1.0,
      Source: 'UserConfirmed',
      ClientId: (session && session.clientName) || '',
      DateAdded: today,
      AddedBy: userName,
    };
    // Optimistic local update
    setLibrary(prev => {
      const exists = prev.find(r => normaliseKey(r.SourceField) === normaliseKey(row.sourceField));
      if (exists) return prev;
      return [...prev, newRow];
    });
    var key = normaliseKey(row.sourceField);
    var cid = (newRow.ClientId || '').trim().toLowerCase();
    // Write to both client-specific AND global buckets
    setLibraryMap(function(prev) {
      var g = new Map(prev.global);
      // Always write to global so all future clients benefit
      if (!g.has(key)) g.set(key, newRow);
      if (cid) {
        // Also write to client-specific bucket (takes priority for this client)
        var clients = Object.assign({}, prev.clients);
        clients[cid] = new Map(clients[cid] || []);
        clients[cid].set(key, newRow);
        return { global: g, clients: clients };
      }
      return { global: g, clients: prev.clients };
    });
    // Write client-specific mapping to OneDrive (existing behaviour)
    await appendTableRow('FieldMappings', [
      newRow.SourceField, newRow.InternalField, newRow.Confidence,
      newRow.Source, newRow.ClientId, newRow.DateAdded, newRow.AddedBy
    ]);
    // Write global mapping to OneDrive only if client-specific (avoid duplicate global write)
    if (cid) {
      var now2 = Date.now();
      var gap2 = now2 - _lastGraphWrite;
      if (gap2 < 150) await new Promise(function(r) { setTimeout(r, 150 - gap2); });
      _lastGraphWrite = Date.now();
      await appendTableRow('FieldMappings', [
        newRow.SourceField, newRow.InternalField, newRow.Confidence,
        'UserConfirmed', '', newRow.DateAdded, newRow.AddedBy
      ]);
    }
  }

  // ── Add mapping from Library view
  async function handleAddMapping({ SourceField, InternalField }) {
    const today = new Date().toISOString().slice(0,10);
    const userName = (account && account.name) || (account && account.username) || 'User';
    const newRow = { SourceField, InternalField, Confidence: 1.0, Source: 'Preloaded', ClientId: '', DateAdded: today, AddedBy: userName };
    setLibrary(prev => [...prev, newRow]);
    setLibraryMap(function(prev) { var g = new Map(prev.global); g.set(normaliseKey(SourceField), newRow); return { global: g, clients: prev.clients }; });
    await appendTableRow('FieldMappings', [SourceField, InternalField, 1.0, 'Preloaded', '', today, userName]);
  }

  // ── Bulk pre-load mappings
  async function handleBulkAdd(rows) {
    var today = new Date().toISOString().slice(0,10);
    var userName = (account && account.name) || (account && account.username) || 'User';
    var added = 0; var skipped = 0;
    for (var ri = 0; ri < rows.length; ri++) {
      var row = rows[ri];
      if (!row.SourceField || !row.InternalField) { skipped++; continue; }
      var key = normaliseKey(row.SourceField);
      if (libraryLookup(libraryMap, key, row.ClientId || '')) { skipped++; continue; } // already exists
      var newRow = { SourceField: row.SourceField, InternalField: row.InternalField,
        Confidence: 1.0, Source: 'Preloaded', ClientId: row.ClientId || '',
        DateAdded: today, AddedBy: userName };
      setLibrary(function(prev) { return [...prev, newRow]; });
      setLibraryMap(function(prev) {
          var cid2 = (newRow.ClientId || '').trim().toLowerCase();
          if (cid2) {
            var clients2 = Object.assign({}, prev.clients);
            clients2[cid2] = new Map(clients2[cid2] || []);
            clients2[cid2].set(key, newRow);
            return { global: prev.global, clients: clients2 };
          } else {
            var g2 = new Map(prev.global);
            if (!g2.has(key)) g2.set(key, newRow);
            return { global: g2, clients: prev.clients };
          }
        });
      await appendTableRow('FieldMappings', [row.SourceField, row.InternalField, 1.0, 'Preloaded', row.ClientId || '', today, userName]);
      added++;
    }
    return { added: added, skipped: skipped };
  }

  // ── Complete mapping → go to output
  function handleMappingComplete(results, normLog) {
    setMappingResults(results);
    setMappingNormLog(normLog);
    setView('output');
    // Update client profile in background
    if (session && session.clientName) {
      updateClientProfile(session.clientName, session.sourceFormat);
    }
  }

  // ── Append ProcessingLog entry
  async function appendLog({ logId, fieldsTotal, fieldsAutoMapped, fieldsReviewed, fieldsUnknown, rowsTotal, rowsAutoNormalised, rowsReviewed, rowsUnknown, clientName, sourceFormat }) {
    try {
      const today = new Date().toISOString().slice(0,10);
      const userName = (account && account.name) || (account && account.username) || 'User';
      // SavedToOutput column (14th) — blank until output is saved
      await appendTableRow('ProcessingLog', [
        logId, clientName, today, sourceFormat,
        fieldsTotal, fieldsAutoMapped, fieldsReviewed, fieldsUnknown,
        rowsTotal || 0, rowsAutoNormalised || 0, rowsReviewed || 0, rowsUnknown || 0,
        userName, ''
      ]);
    } catch(e) { /* non-blocking */ }
  }

  // ── Append RowProcessingLog — one entry per asset row
  async function appendRowLog(logId, rows, session) {
    try {
      var today = new Date().toISOString().slice(0,10);
      var clientId = session.clientName || '';
      // Write rows sequentially with throttle guard
      for (var ri = 0; ri < rows.length; ri++) {
        var row = rows[ri];
        var now = Date.now();
        var gap = now - _lastGraphWrite;
        if (gap < 150) await new Promise(function(res){ setTimeout(res, 150 - gap); });
        _lastGraphWrite = Date.now();
        await appendTableRow('RowProcessingLog', [
          newLogId(),
          logId,
          clientId,
          today,
          row['EquipmentId'] || '',
          row['DeviceDescription'] || '',
          row['Manufacturer'] || '',
          row['SerialNumber'] || '',
          'Normalised',
          1.0,
          '',
          'Confirmed'
        ]);
      }
    } catch(e) { /* non-blocking */ }
  }

  // ── Update ClientProfiles after processing
  async function updateClientProfile(clientName, sourceFormat) {
    if (!clientName) return;
    try {
      var today = new Date().toISOString().slice(0,10);
      var existing = clientProfiles.find(function(cp) {
        return (cp.ClientName || '').toLowerCase() === clientName.toLowerCase();
      });
      if (existing) {
        // Update existing — PATCH the row in OneDrive by row index
        var newFormats = existing.KnownFormats
          ? (existing.KnownFormats.includes(sourceFormat) ? existing.KnownFormats : existing.KnownFormats + '|' + sourceFormat)
          : sourceFormat;
        var newTotal = (parseInt(existing.TotalRFPs) || 0) + 1;
        var updated = Object.assign({}, existing, {
          TotalRFPs: newTotal, LastSeen: today, KnownFormats: newFormats,
        });
        // Optimistic local update
        setClientProfiles(function(prev) {
          return prev.map(function(cp) { return cp.ClientId === existing.ClientId ? updated : cp; });
        });
        // PATCH the existing row in OneDrive
        if (existing._rowIndex !== undefined) {
          await updateTableRow('ClientProfiles', existing._rowIndex, [
            existing.ClientId, existing.ClientName, newFormats, newTotal, today, existing.Notes || ''
          ]);
        }
      } else {
        var newId = 'CLIENT-' + Date.now().toString(36).toUpperCase();
        var newProfile = {
          ClientId: newId, ClientName: clientName,
          KnownFormats: sourceFormat, TotalRFPs: 1, LastSeen: today, Notes: ''
        };
        setClientProfiles(function(prev) { return [...prev, newProfile]; });
        await appendTableRow('ClientProfiles', [newId, clientName, sourceFormat, 1, today, '']);
      }
    } catch(e) { /* non-blocking */ }
  }

  // ── Save normalised output row to NormalisedOutputs table on OneDrive
  async function saveOutput(outputRow, schemaFields, sess, sessionLogId) {
    // ── Scenario C dedup: check ProcessingLog for SavedToOutput flag ─────
    if (sessionLogId) {
      try {
        var plData = await graphGet(WB + '/tables/ProcessingLog/range');
        if (plData && plData.values && plData.values.length > 1) {
          var plHdrs = plData.values[0];
          var logIdCol = plHdrs.indexOf('LogId');
          var savedCol = plHdrs.indexOf('SavedToOutput');
          if (logIdCol > -1 && savedCol > -1) {
            var existingRow = plData.values.slice(1).find(function(r) {
              return String(r[logIdCol] || '').trim() === String(sessionLogId).trim();
            });
            if (existingRow && String(existingRow[savedCol] || '').trim() === 'Yes') {
              throw new Error('ALREADY_SAVED');
            }
          }
        }
      } catch(e) {
        if (e.message === 'ALREADY_SAVED') throw e;
        // ProcessingLog read failed — allow save to proceed
      }
    }
    const today = new Date().toISOString().slice(0,10);
    const userName = (account && account.name) || (account && account.username) || 'User';
    const values = schemaFields.map(f => String(outputRow[f.FieldName] || ''));
    values.push(sess.clientName || '', sess.sourceFormat || '', today, userName, sessionLogId || newLogId());
    await appendTableRow('NormalisedOutputs', values);
    // Mark ProcessingLog row as saved (best-effort, non-blocking)
    if (sessionLogId) {
      try {
        var plData2 = await graphGet(WB + '/tables/ProcessingLog/range');
        if (plData2 && plData2.values && plData2.values.length > 1) {
          var plHdrs2 = plData2.values[0];
          var logIdCol2 = plHdrs2.indexOf('LogId');
          var savedCol2 = plHdrs2.indexOf('SavedToOutput');
          if (logIdCol2 > -1 && savedCol2 > -1) {
            var rowIdx = plData2.values.slice(1).findIndex(function(r) {
              return String(r[logIdCol2] || '').trim() === String(sessionLogId).trim();
            });
            if (rowIdx > -1) {
              var patchValues = plData2.values[rowIdx + 1].slice();
              patchValues[savedCol2] = 'Yes';
              await graphPatch(
                WB + '/tables/ProcessingLog/rows/itemAt(index=' + rowIdx + ')',
                { values: [patchValues] }
              );
            }
          }
        }
      } catch(_e) { /* non-blocking — audit mark failure doesn't block user */ }
    }
  }

  // ── Reset
  function handleReset() {
    setSession(null); setMappingResults([]); setMappingNormLog([]); setView('upload');
  }

  // ── RENDER ──
  if (authState === 'loading') {
    return (
      <div className="auth-screen">
        <div className="auth-card">
          <div className="auth-logo">RFP</div>
          <div className="auth-title">RFP Normalisation Engine</div>
          <div className="auth-sub">Initialising…</div>
          <div className="spinner" style={{margin:'0 auto'}} />
        </div>
      </div>
    );
  }

  if (authState !== 'authenticated') {
    return (
      <div className="auth-screen">
        <div className="auth-card">
          <div className="auth-logo">RFP</div>
          <div className="auth-title">RFP Normalisation Engine</div>
          <div className="auth-sub">Sign in with your Microsoft account to continue</div>
          <button className="btn-signin" onClick={handleSignIn}>Sign in with Microsoft</button>
          <p className="auth-note">Internal use only · Microsoft 365 authentication required</p>
        </div>
        <Toasts toasts={toast.toasts} />
      </div>
    );
  }

  const NAV_ITEMS = [
    { key:'upload',   label:'Upload' },
    { key:'review',   label:'Mapping Review',  hidden: !session },
    { key:'output',   label:'Output',          hidden: mappingResults.length===0 },
    { key:'library',  label:'Library' },
    { key:'bulk',     label:'Bulk Pre-load' },
    { key:'log',      label:'Processing Log' },
    { key:'dashboard',label:'Dashboard' },
    { key:'clients',  label:'Clients' },
    { key:'settings', label:'Settings' },
  ].filter(function(n) { return !n.hidden; });

  return (
    <div className="app-shell">
      <header className="topbar">
        <div className="topbar-brand">
          <div className="topbar-logo">RFP</div>
          <div>
            <span className="topbar-title">RFP Normalisation Engine</span>
            <span className="topbar-subtitle">/ HTM</span>
          </div>
        </div>
        <nav className="topbar-nav">
          {NAV_ITEMS.map(n => (
            <button key={n.key} className={`nav-btn ${view===n.key?'active':''}`} onClick={()=>setView(n.key)}>
              {n.label}
            </button>
          ))}
        </nav>
        <div className="topbar-user">
          <span className="user-name">{(account && account.name) || (account && account.username)}</span>
          <button className="btn-signout" onClick={handleSignOut}>Sign out</button>
        </div>
      </header>

      <main className="main">
        {loading ? (
          <div className="spinner-wrap">
            <div className="spinner" />
            <div className="spinner-label">{loadingMsg || 'Loading…'}</div>
          </div>
        ) : (
          <>
            {view==='upload' && (
              <UploadView
                onProcess={handleProcess}
                libraryMap={libraryMap}
                schema={schema}
                libraryCount={library.length}
                clientProfiles={clientProfiles}
                thresholds={thresholds}
                valueMap={valueMap}
                toast={toast}
              />
            )}
            {view==='review' && session && (
              <MappingReviewView
                session={session}
                schema={schema}
                onConfirmMapping={handleConfirmMapping}
                onComplete={handleMappingComplete}
                toast={toast}
              />
            )}
            {view==='output' && mappingResults.length > 0 && (
              <OutputView
                results={mappingResults}
                normLog={mappingNormLog}
                session={session}
                setSession={setSession}
                schema={schema}
                onReset={handleReset}
                appendLog={appendLog}
                appendRowLog={appendRowLog}
                saveOutput={saveOutput}
                toast={toast}
              />
            )}
            {view==='library' && (
              <LibraryView
                library={library}
                schema={schema}
                onAddMapping={handleAddMapping}
                toast={toast}
              />
            )}
            {view==='clients' && (
              <ClientsView
                clientProfiles={clientProfiles}
                library={library}
              />
            )}
            {view==='log' && (
              <ProcessingLogView
                processingLog={processingLog}
              />
            )}
            {view==='bulk' && (
              <BulkPreloadView
                schema={schema}
                library={library}
                onBulkAdd={handleBulkAdd}
                toast={toast}
              />
            )}
            {view==='dashboard' && (
              <DashboardView
                processingLog={processingLog}
                library={library}
              />
            )}
            {view==='settings' && (
              <SettingsView
                schema={schema}
                thresholds={thresholds}
                setThresholds={setThresholds}
              />
            )}
          </>
        )}
      </main>
      <Toasts toasts={toast.toasts} />
    </div>
  );
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(e) { return { error: e }; }
  render() {
    if (this.state.error) {
      return (
        <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'#054B16'}}>
          <div style={{background:'rgba(255,255,255,0.06)',border:'1px solid rgba(255,255,255,0.12)',borderRadius:12,padding:40,maxWidth:480,textAlign:'center'}}>
            <div style={{fontSize:32,marginBottom:16}}>⚠</div>
            <div style={{color:'#fff',fontSize:16,fontWeight:600,marginBottom:8,fontFamily:'IBM Plex Mono,monospace'}}>Application Error</div>
            <div style={{color:'rgba(255,255,255,0.5)',fontSize:12,fontFamily:'IBM Plex Mono,monospace',marginBottom:24}}>{this.state.error.message}</div>
            <button onClick={()=>window.location.reload()} style={{background:'#2D6BE4',color:'#fff',border:'none',borderRadius:8,padding:'10px 24px',fontSize:13,cursor:'pointer',fontFamily:'Plus Jakarta Sans,sans-serif'}}>Reload Application</button>
          </div>
        </div>
      );
    }
    return this.props.children;
  }
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <ErrorBoundary><App /></ErrorBoundary>
);
</script>).render(
  <ErrorBoundary><App /></ErrorBoundary>
);
</script>
</body>
</html>
