    options = options || {};
    const ext = f.name.split('.').pop().toLowerCase();
    if (ext === 'csv' || ext === 'tsv') {
      return new Promise((res, rej) => {
        Papa.parse(f, {
          header: true, skipEmptyLines: true,
          complete: r => res(r.data),
          error: e => rej(e)
        });
      });
    }
    if (ext === 'xlsx' || ext === 'xls') {
      // File size guard — prevents browser OOM on oversized uploads
      var MAX_BYTES = 50 * 1024 * 1024; // 50 MB
      if (f.size > MAX_BYTES) {
        throw new Error('File too large (' + (f.size/1024/1024).toFixed(1) + ' MB). Maximum is 50 MB.');
      }
      const buf = await f.arrayBuffer();
      const wb = XLSX.read(buf, { type: 'array' });
      const allSheets = wb.SheetNames;
      // Multi-tab: build tab metadata for preview modal
      if (allSheets.length > 1 && !options.selectedTabs) {
        var tabMeta = allSheets.map(function(sn) {
          var ws2 = wb.Sheets[sn];
          var rows2 = parseSheetRobust(ws2);
          var headers2 = rows2.length > 0 ? Object.keys(rows2[0]) : [];
          var status = rows2.length === 0 ? 'empty' : headers2.length === 0 ? 'noheaders' : 'ready';
          return { name: sn, rowCount: rows2.length, colCount: headers2.length, status: status };
        });
        if (onProgress) onProgress({ tabMeta: tabMeta });
        return null; // Signal caller to show tab preview modal
      }
      // selectedTabs provided — stack all selected tabs into one unified table
      var selectedTabs = options.selectedTabs || [allSheets[0]];
      var stacked = [];
      var tabSummary = [];

  // ── Helper: parse a worksheet robustly, skipping leading blank rows ────
  function parseSheetRobust(ws2) {
    // Get all rows as arrays (raw: avoids SheetJS treating blank row 1 as headers)
    var allRows = XLSX.utils.sheet_to_json(ws2, { header: 1, defval: '', raw: false });
    if (!allRows || allRows.length === 0) return [];
    // Find first row that has at least one non-empty cell — this is the header row
    var headerRowIdx = -1;
    for (var ri = 0; ri < allRows.length; ri++) {
      if (allRows[ri].some(function(c) { return c !== null && c !== undefined && String(c).trim() !== ''; })) {
        headerRowIdx = ri;
        break;
      }
    }
    if (headerRowIdx < 0) return [];
    var hdrs = allRows[headerRowIdx].map(function(h) {
      return (h !== null && h !== undefined && String(h).trim()) ? String(h).trim() : null;
    });
    // Build objects from subsequent rows
    var result = [];
    for (var di = headerRowIdx + 1; di < allRows.length; di++) {
      var rawRow = allRows[di];
      // Skip completely blank rows
      if (!rawRow.some(function(c) { return c !== null && c !== undefined && String(c).trim() !== ''; })) continue;
      var obj = {};
      hdrs.forEach(function(h, ci) {
        if (h) obj[h] = (rawRow[ci] !== undefined && rawRow[ci] !== null) ? String(rawRow[ci]).trim() : '';
      });
      result.push(obj);
    }
    return result;
  }

      // Facility name column candidates — any of these headers carry the facility name
      var FAC_HEADERS = [
        'facility name','facility','hospital name','hospital','site name','site',
        'location name','campus','system name','client name'
      ];
      selectedTabs.forEach(function(sn) {
        if (!allSheets.includes(sn)) {
          tabSummary.push(sn + ': not found');
          return;
        }
        var ws2 = wb.Sheets[sn];
        var rows2 = parseSheetRobust(ws2);
        tabSummary.push(sn + ': ' + rows2.length + ' rows');
        // Extract facility name hint from first data row
        var facHint = '';
        if (rows2.length > 0) {
          var firstRow = rows2[0];
          var firstKeys = Object.keys(firstRow);
          for (var fki = 0; fki < firstKeys.length; fki++) {
            var fkLower = firstKeys[fki].toLowerCase().trim();
            if (FAC_HEADERS.indexOf(fkLower) > -1) {
              var fv = String(firstRow[firstKeys[fki]] || '').trim();
              if (fv) { facHint = sanitiseHtml(fv); break; }
            }
          }
        }
        rows2.forEach(function(row) {
          row['__SourceTab__'] = sanitiseHtml(String(sn));
          if (facHint) row['__FacilityHint__'] = facHint;
          stacked.push(row);
        });
      });
      // Surface stacking summary via onProgress so UI can toast it
      if (onProgress && selectedTabs.length > 1) {
        onProgress({ stackSummary: tabSummary, totalStacked: stacked.length });
      }
      return stacked;
    }
    if (ext === 'docx' || ext === 'doc') {
      // mammoth.js Word parser
      if (typeof mammoth === 'undefined') throw new Error('Word document parser not loaded. Please refresh.');
      if (f.size > 50 * 1024 * 1024) throw new Error('File too large (' + (f.size/1024/1024).toFixed(1) + ' MB). Maximum is 50 MB.');
      const buf = await f.arrayBuffer();
      const result = await mammoth.convertToHtml({ arrayBuffer: buf });
      const html = result.value;
      // Try to extract table from HTML
      const tableData = extractHtmlTable(html);
      if (tableData && tableData.length > 0) return tableData;
      // No table found — extract key:value pairs from text
      const msgs = result.messages || [];
      const warnings = msgs.filter(function(m) { return m.type === 'warning'; });
      if (warnings.length > 0) console.warn('Word parse warnings:', warnings);
      throw new Error('No table found in Word document. Ensure the RFP data is in a table format.');
    }
    if (ext === 'json') {
      const txt = await f.text();
      var parsed = JSON.parse(txt);
      // If top-level is an object with a nested array, try to find it
      if (!Array.isArray(parsed)) {
        var arrayKey = Object.keys(parsed).find(function(k) { return Array.isArray(parsed[k]); });
        parsed = arrayKey ? parsed[arrayKey] : [parsed];
      }
      // Flatten each row: coerce all values to strings/numbers, stringify nested objects
      return parsed.map(function(row) {
        var flat = {};
        Object.keys(row).forEach(function(k) {
          var v = row[k];
          if (v === null || v === undefined) {
            flat[k] = '';
          } else if (Array.isArray(v)) {
            flat[k] = v.join(', ');
          } else if (typeof v === 'object') {
            // Flatten one level of nested objects as separate fields
            Object.keys(v).forEach(function(nk) {
              var nv = v[nk];
              if (Array.isArray(nv)) {
                flat[k + '_' + nk] = nv.join(', ');
              } else if (typeof nv === 'object' && nv !== null) {
                flat[k + '_' + nk] = JSON.stringify(nv);
              } else {
                flat[k + '_' + nk] = (nv !== null && nv !== undefined) ? String(nv) : '';
              }
            });
          } else {
            flat[k] = typeof v === 'number' ? v : String(v);
          }
        });
        return flat;
      });
    }
    if (ext === 'pdf') {
      // PDF via Cloudflare Worker → Azure Document Intelligence
      if (onProgress) onProgress({ status: 'pdf', message: 'Sending to Document Intelligence…' });
      if (CF_WORKER_URL.includes('YOUR-SUBDOMAIN')) {
        throw new Error('PDF processing requires the Cloudflare Worker to be deployed. See setup instructions.');
      }
      if (f.size > 25 * 1024 * 1024) throw new Error('PDF too large (' + (f.size/1024/1024).toFixed(1) + ' MB). Maximum is 25 MB for PDF processing.');
      const pdfBuf = await f.arrayBuffer();
      const workerRes = await fetch(CF_WORKER_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/pdf' },
        body: pdfBuf,
      });
      if (!workerRes.ok) {
        const errText = await workerRes.text();
        throw new Error('PDF processing failed: ' + errText);
      }
      const pdfResult = await workerRes.json();
      // Azure returns tables array — use first table
      if (!pdfResult || !pdfResult.tables || pdfResult.tables.length === 0) {
        throw new Error('No tables found in PDF. The document may be scanned — OCR is running, please retry in 30 seconds.');
      }
      var tableCount = pdfResult.tables.length;
      if (tableCount > 1 && onProgress) onProgress({ extraTables: tableCount });
      // Merge ALL tables into a single combined record
      // Each table is treated as a separate section of the same RFP
      function azureTableToObj(tbl) {
        var hdr = {}, dRows = {};
        tbl.cells.forEach(function(cell) {
          if (cell.rowIndex === 0) { hdr[cell.columnIndex] = cell.content; }
          else {
            if (!dRows[cell.rowIndex]) dRows[cell.rowIndex] = {};
            dRows[cell.rowIndex][cell.columnIndex] = cell.content;
          }
        });
        var hdrs = Object.values(hdr);
        var colCount = tbl.columnCount || hdrs.length;
        // Detect two-column key-value tables (e.g. "Field | Value" or "Label | Data")
        // These have 2 columns where the first column values are the real field names
        var kvKeywords = ['field', 'value', 'label', 'data', 'item', 'description', 'detail', 'information', 'property', 'attribute'];
        var isKVTable = colCount === 2 && hdrs.length === 2 &&
          kvKeywords.some(function(k) { return hdrs[0].toLowerCase().includes(k); }) &&
          kvKeywords.some(function(k) { return hdrs[1].toLowerCase().includes(k); });
        if (isKVTable) {
          // Transpose: each row becomes a field — left cell = field name, right cell = value
          var obj = {};
          Object.values(dRows).forEach(function(row) {
            var fieldName = safeStr(row[0] || '');
            var fieldValue = safeStr(row[1] || '');
            if (fieldName) obj[fieldName] = fieldValue;
          });
          return Object.keys(obj).length > 0 ? [obj] : [];
        }
        // Standard table: first row = headers, subsequent rows = data
        return Object.values(dRows).map(function(row) {
          var obj = {};
          hdrs.forEach(function(h, i) { obj[h] = safeStr(row[i] || ''); });
          return obj;
        });
      }
      // Build one merged record from all tables
      var mergedRecord = {};
      pdfResult.tables.forEach(function(tbl) {
        var rows = azureTableToObj(tbl);
        rows.forEach(function(row) {
          Object.keys(row).forEach(function(k) {
            if (k && !mergedRecord[k]) mergedRecord[k] = row[k];
          });
        });
      });
      return [mergedRecord];
    }
    throw new Error('Format .' + ext + ' is not supported. Supported: CSV, TSV, Excel, Word, PDF, JSON, HTML.');
  }

  function parsePaste(text) {
    // Try HTML table
    if (text.trim().startsWith('<')) {
      const div = document.createElement('div');
      div.innerHTML = sanitiseHtml(text);
      const rows = div.querySelectorAll('tr');
      if (rows.length > 1) {
        const headers = [...rows[0].querySelectorAll('th,td')].map(c => c.textContent.trim());
        return [...rows].slice(1).map(row => {
          const cells = [...row.querySelectorAll('td,th')];
          const obj = {};
          headers.forEach((h, i) => { obj[h] = (cells[i] ? cells[i].textContent.trim() : ''); });
          return obj;
        });
      }
    }
    // Try CSV
    const result = Papa.parse(text.trim(), { header: true, skipEmptyLines: true });
    return result.data;
  }

  // Google Sheets URL → CSV export URL
  function sheetsUrlToCsv(url) {
    var m = url.match(/\/spreadsheets\/d\/([a-zA-Z0-9_-]+)/);
    if (!m) return null;
    var id = m[1];
    return 'https://docs.google.com/spreadsheets/d/' + id + '/export?format=csv&id=' + id;
  }

  async function handleProcess(confirmedTabs) {
    if (!file && !pasteText.trim()) { toast.add('Please upload a file or paste table data', 'error'); return; }
    setProcessing(true);
    setPdfStatus('');
    try {
      var rawData;
      var detectedFormat = 'PASTE';

      // Google Sheets URL in paste area
      if (!file && pasteText.trim().includes('docs.google.com/spreadsheets')) {
        setPdfStatus('Fetching Google Sheet…');
        var csvUrl = sheetsUrlToCsv(pasteText.trim());
        if (!csvUrl) throw new Error('Could not parse Google Sheets URL. Use File → Share → Copy link.');
        var gRes = await fetch(csvUrl);
        if (!gRes.ok) throw new Error('Could not fetch Google Sheet. Ensure it is shared as Anyone with the link.');
        var gText = await gRes.text();
        rawData = Papa.parse(gText, { header: true, skipEmptyLines: true }).data;
        detectedFormat = 'GOOGLE_SHEETS';
        setPdfStatus('');
      } else if (file) {
        var ext = file.name.split('.').pop().toLowerCase();
        detectedFormat = ext.toUpperCase();
        if (ext === 'pdf') {
          setPdfStatus('Sending to Azure Document Intelligence…');
        }
        rawData = await parseFile(file, function(info) {
          if (info && info.status === 'pdf') setPdfStatus(info.message || 'Processing PDF…');
          if (info && info.tabMeta) {
            setTabMeta(info.tabMeta);
            var defaults = {};
            info.tabMeta.forEach(function(t) { defaults[t.name] = t.status === 'ready'; });
            setSelectedTabs(defaults);
            setShowTabPreview(true);
          }
          if (info && info.stackSummary) {
            toast.add('Stacked ' + info.totalStacked + ' rows from ' + info.stackSummary.length + ' sheets: ' + info.stackSummary.join(', '), 'success');
          }
        }, { selectedTabs: (Array.isArray(confirmedTabs) && confirmedTabs.length > 0) ? confirmedTabs : (showTabPreview ? Object.keys(selectedTabs).filter(function(k){ return selectedTabs[k]; }) : null) });
        // If parseFile returned null it means multi-tab preview needed
        if (rawData === null) {
          setProcessing(false);
          return;
        }
        setPdfStatus('');
      } else {
        rawData = parsePaste(pasteText);
      }

      // HTML envelope detection — if JSON/other wrapper contains embedded HTML
      // If stacked from multi-tab, propagate __SourceTab__ and __FacilityHint__
      if (rawData && rawData.length > 0 && rawData[0]['__SourceTab__'] !== undefined) {
        rawData = rawData.map(function(row) {
          var r = Object.assign({}, row);
          r['SourceTab'] = r['__SourceTab__'];
          if (r['__FacilityHint__']) {
            r['__FacilityHint__'] = r['__FacilityHint__'];
          }
          delete r['__SourceTab__'];
          return r;
        });
      }
      rawData = detectAndExtractEnvelope(rawData);
      // Universal table structure normalisation — fixes KV tables, section headers,
      // blank separator rows for CSV, Excel, JSON, Google Sheets, HTML paste
      rawData = normaliseTableStructure(rawData);

      if (!rawData || rawData.length === 0) throw new Error('No data found in document.');
      var headers = Object.keys(rawData[0]);
      if (headers.length === 0) throw new Error('Could not detect column headers.');

      // Build mapping results using Tier 1 + Tier 2
      // Run Tier 1 + Tier 2 for all fields, then Tier 3 (LLM) for grey/ambiguous
      var llmEnabled = thresholds && thresholds.llmEnabled !== false;
      var tier12Results = headers.map(function(h) {
        var found = rawData.find(function(r) { return r[h] && String(r[h]).trim(); });
        var sampleVal = found ? found[h] : '';
        return mapField(h, sampleVal, libraryMap, schema, thresholds, clientName);
      });
      // Tier 3: fire LLM for grey or ambiguous fields in parallel
      // Tier 3: sequential LLM calls to avoid API rate limiting
      // Fires for grey, red and ambiguous fields — 200ms gap between calls
      var results = [];
      for (var ri = 0; ri < tier12Results.length; ri++) {
        var r = tier12Results[ri];
        if (llmEnabled && (r.tier === 'grey' || r.tier === 'red' || r.ambiguous)) {
          if (ri > 0) await new Promise(function(res) { setTimeout(res, 200); });
          var llm = await callLLMTier3(r.sourceField, r.sampleValue, schema);
          if (llm) {
            results.push(Object.assign({}, r, {
              internalField:  llm.internalField,
              confidence:     llm.confidence,
              tier:           llm.confidence >= 0.85 ? 'amber' : 'red',
              mappingTier:    3,
              llmExplanation: llm.explanation,
              ambiguous:      false,
            }));
            continue;
          }
        }
        results.push(r);
      }

      // Value normalisation log — dates, currencies + categoricals via ValueMappings
      var normLog = [];
      results.forEach(function(r) {
        if (!r.internalField) return;
        var schField = schema.find(function(s) { return s.FieldName === r.internalField; });
        if (!schField) return;
        if (schField.DataType === 'date' && r.sampleValue) {
          var nd = normaliseDate(r.sampleValue);
          if (nd) normLog.push({ field: r.internalField, original: nd.original, normalised: nd.normalised, type: 'date' });
        }
        if (schField.DataType === 'currency' && r.sampleValue) {
          var nc = normaliseCurrency(r.sampleValue);
          if (nc) normLog.push({ field: r.internalField, original: nc.original, normalised: nc.normalised, type: 'currency' });
        }
        if (schField.DataType === 'categorical' && r.sampleValue) {
          var mapped = lookupValueMap(valueMap, r.internalField, r.sampleValue);
          if (mapped && mapped !== String(r.sampleValue)) {
            normLog.push({ field: r.internalField, original: String(r.sampleValue), normalised: mapped, type: 'categorical' });
          }
        }
      });

      // ── Row-level value normalisation (all fields, all rows) ──────────────
      // For every row, normalise every cell value via ValueMappings (Tier1)
      // then semantic/LLM for unresolved categoricals
      var normalisedRows = rawData.map(function(row) {
        var normRow = {};
        results.forEach(function(r) {
          if (!r.internalField) return;
          var rawVal = row[r.sourceField];
          if (rawVal === undefined || rawVal === null) { normRow[r.internalField] = ''; return; }
          var strVal = sanitiseHtml(String(rawVal).trim());
          var schField = schema.find(function(s) { return s.FieldName === r.internalField; });
          if (!schField) { normRow[r.internalField] = strVal; return; }
          // Tier 1 value: exact ValueMappings lookup
          var vmHit = lookupValueMap(valueMap, r.internalField, strVal);
          if (vmHit && vmHit !== strVal) {
            normRow[r.internalField] = vmHit;
            return;
          }
          // Date normalisation
          if (schField.DataType === 'date' && strVal) {
            var nd = normaliseDate(strVal);
            normRow[r.internalField] = nd ? nd.normalised : strVal;
            return;
          }
          // Currency normalisation
          if (schField.DataType === 'currency' && strVal) {
            var nc = normaliseCurrency(strVal);
            normRow[r.internalField] = nc ? String(nc.normalised) : strVal;
            return;
          }
          // Categorical — title-case if no map hit
          if (schField.DataType === 'categorical' && strVal) {
            normRow[r.internalField] = strVal.charAt(0).toUpperCase() + strVal.slice(1).toLowerCase();
            return;
          }
          // Free text — pass through sanitised
          normRow[r.internalField] = strVal;
        });
        return normRow;
      });

      // ── EquipmentId fallback chain ─────────────────────────────────
      // If EquipmentId is empty after normalisation, scan internal field
      // priority chain on the normalised row, then raw source fields
      var EQ_PRIORITY = [
        'EquipmentId','BidNumber','AssetTag','AltControlNumber','MasterId'
      ];
      normalisedRows = normalisedRows.map(function(normRow, idx) {
        if (normRow['EquipmentId'] && String(normRow['EquipmentId']).trim()) return normRow;
        // Scan internal priority chain first
        for (var pi = 0; pi < EQ_PRIORITY.length; pi++) {
          var fName = EQ_PRIORITY[pi];
          if (fName === 'EquipmentId') continue; // already empty
          var v = normRow[fName];
          if (v && String(v).trim()) {
            normRow['EquipmentId'] = String(v).trim();
            return normRow;
          }
        }
        // Fall back to scanning raw source row for any identity-like field
        var rawRow = rawData[idx] || {};
        var idKeywords = ['id','tag','number','asset','serial','control','inventory','ce','bid'];
        var rawKeys = Object.keys(rawRow);
        for (var ki = 0; ki < rawKeys.length; ki++) {
          var key = rawKeys[ki].toLowerCase();
          var isId = idKeywords.some(function(kw) { return key.indexOf(kw) > -1; });
          if (isId) {
            var rv = rawRow[rawKeys[ki]];
            if (rv && String(rv).trim() && String(rv).trim() !== '0') {
              normRow['EquipmentId'] = sanitiseHtml(String(rv).trim());
              return normRow;
            }
          }
        }
        return normRow;
      });

      // ── Fix 3: Stamp SourceFormat on every normalised row ──────────
      normalisedRows = normalisedRows.map(function(normRow) {
        if (!normRow['SourceFormat'] || !String(normRow['SourceFormat']).trim()) {
          normRow['SourceFormat'] = detectedFormat || '';
        }
        return normRow;
      });

      // ── Fix 4: FacilityName fallback chain ───────────────────────
      // Priority: mapped value → __FacilityHint__ (from source data) → SourceTab name
      // SystemName: mapped value → clientName
      normalisedRows = normalisedRows.map(function(normRow, nri) {
        var srcTab = normRow['SourceTab'] || '';
        var rawRow = rawData[nri] || {};
        var facHint = rawRow['__FacilityHint__'] || '';
        // FacilityName fallback chain
        if (!normRow['FacilityName'] || !String(normRow['FacilityName']).trim()) {
          if (facHint) {
            normRow['FacilityName'] = facHint;
          } else if (srcTab) {
            normRow['FacilityName'] = sanitiseHtml(srcTab);
          }
        }
        // SystemName fallback — use clientName if empty
        if ((!normRow['SystemName'] || !String(normRow['SystemName']).trim()) && clientName) {
          normRow['SystemName'] = sanitiseHtml(clientName);
        }
        return normRow;
      });

      onProcess({ results, rawData, normalisedRows, clientName, sourceFormat: detectedFormat, normLog });
    } catch (err) {
      toast.add(err.message || 'Failed to process document', 'error');
    }
    setProcessing(false);
    setPdfStatus('');
  }

  return (
    <div>
      <div style={{marginBottom:24}}>
        <h2 style={{fontSize:20,fontWeight:700,color:'var(--navy)',marginBottom:4}}>Process a New RFP Document</h2>
        <p style={{fontSize:13,color:'var(--text-3)',fontFamily:'var(--mono)'}}>Upload or paste an RFP document to begin mapping</p>
      </div>
      <div className="upload-grid">
        <div>
          <div
            className={`dropzone ${dragOver?'drag-over':''} ${file?'file-selected':''}`}
            onDragOver={e=>{e.preventDefault();setDragOver(true);}}
            onDragLeave={()=>setDragOver(false)}
            onDrop={handleDrop}
            onClick={()=>!file && fileRef.current.click()}
            style={file?{cursor:'default'}:{}}
          >
            <div className="dropzone-icon">📂</div>
            <div className="dropzone-title">Drag &amp; drop your RFP document</div>
            <div className="dropzone-sub">or click to browse</div>
            <div className="dropzone-formats" style={{marginTop:14}}>
              {FORMAT_BADGES.map(f => (
                <span key={f} className="badge badge-navy" style={{fontSize:10}}>{f}</span>
              ))}
            </div>
          </div>
          <input ref={fileRef} type="file" accept=".csv,.tsv,.xlsx,.xls,.docx,.doc,.pdf,.json,.html"
            style={{display:'none'}} onChange={e=>setFile(e.target.files[0])} />

          {file && (
            <div className="file-info">
              <span className="file-icon">{getFileIcon(file)}</span>
              <div style={{flex:1}}>
                <div className="file-name">{file.name}</div>
                <div className="file-meta">{formatBytes(file.size)} · {file.name.split('.').pop().toUpperCase()}</div>
              </div>
              <button className="btn btn-ghost btn-sm" onClick={()=>setFile(null)}>Remove</button>
            </div>
          )}

          <div className="paste-area" style={{marginTop:20}}>
            <label className="form-label">Or paste table data (CSV or HTML table)</label>
            <textarea className="form-input paste-textarea"
              value={pasteText} onChange={e=>setPasteText(e.target.value)}
              placeholder="Paste CSV-formatted text or HTML table markup here..." rows={4}
              style={{fontFamily:'var(--mono)',fontSize:12}} />
          </div>

          <div style={{marginTop:20}}>
            <label className="form-label">Client Name (optional)</label>
            {clientProfiles && clientProfiles.length > 0 ? (
              <div style={{display:'flex',gap:8}}>
                <select className="form-input" value={clientName}
                  onChange={function(e){
                    if (e.target.value === '__new__') { setClientName(''); setShowNewClient(true); }
                    else { setClientName(e.target.value); setShowNewClient(false); }
                  }}
                  style={{flex:1}}
                  title="Select a known client to use their confirmed mappings first, or choose New Client to type a new name.">
                  <option value="">— Global only (no client scope) —</option>
                  {clientProfiles.slice().sort(function(a,b){ return (a.ClientName||'').localeCompare(b.ClientName||''); }).map(function(cp) {
                    return React.createElement('option', { key: cp.ClientId, value: cp.ClientName }, cp.ClientName + (cp.TotalRFPs ? ' (' + cp.TotalRFPs + ' RFPs)' : ''));
                  })}
                  <option value="__new__">+ New client…</option>
                </select>
              </div>
            ) : null}
            {(showNewClient || !clientProfiles || clientProfiles.length === 0) && (
              <input className="form-input" type="text" value={clientName}
                onChange={function(e){setClientName(e.target.value);}}
                placeholder="e.g. Acme Corp, Metro Health Network"
                style={{marginTop: clientProfiles && clientProfiles.length > 0 ? 6 : 0}}
                title="Type a new client name. Confirmed mappings for this session will be saved under this name." />
            )}
            <p className="inline-note">Client-specific mappings apply first — global mappings apply to all clients. Leave blank to use global only.</p>
          </div>

          <div style={{marginTop:24}}>
            <button className="btn btn-primary" onClick={function(){ handleProcess(); }} disabled={processing||(!file&&!pasteText.trim())} style={{padding:'10px 28px',fontSize:14}}>
              {processing ? '⟳  Processing...' : '→  Process Document'}
            </button>
            {pdfStatus && (
              <div style={{display:'flex',alignItems:'center',gap:8,marginTop:10,padding:'8px 14px',background:'var(--surface-2)',borderRadius:'var(--radius)',border:'1px solid var(--border)'}}>
                <div className="spinner" style={{width:16,height:16,borderWidth:2}}/>
                <span style={{fontSize:12,fontFamily:'var(--mono)',color:'var(--text-2)'}}>{pdfStatus}</span>
              </div>
            )}
            {showTabPreview && tabMeta.length > 0 && (
              <div style={{marginTop:16,padding:'16px',background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'var(--radius)'}}>
                <div style={{fontSize:14,fontWeight:700,color:'var(--navy)',marginBottom:4}}>Multiple sheets detected</div>
                <div style={{fontSize:12,color:'var(--text-3)',marginBottom:14,fontFamily:'var(--mono)'}}>
                  Select which sheets to include. All will be stacked into one normalised output.
                </div>
                <div style={{display:'flex',flexDirection:'column',gap:8,marginBottom:16}}>
                  {tabMeta.map(function(t) {
                    var isReady = t.status === 'ready';
                    var isSelected = selectedTabs[t.name] === true;
                    var statusColor = t.status === 'ready' ? 'var(--green)' : 'var(--amber)';
                    var statusLabel = t.status === 'empty' ? '⚠ No data detected' : t.status === 'noheaders' ? '⚠ No headers detected' : t.rowCount + ' rows · ' + t.colCount + ' cols';
                    return React.createElement('div', {
                      key: t.name,
                      style: {display:'flex',alignItems:'center',gap:12,padding:'10px 12px',background:isSelected?'var(--blue-bg)':'var(--bg)',border:'1px solid '+(isSelected?'var(--blue)':'var(--border)'),borderRadius:6,cursor:'pointer'},
                      onClick: function() {
                        setSelectedTabs(function(prev) {
                          var next = Object.assign({}, prev);
                          next[t.name] = !prev[t.name];
                          return next;
                        });
                      }
                    },
                      React.createElement('input', {
                        type:'checkbox', checked: isSelected,
                        onChange:function(){},
                        style:{accentColor:'var(--blue)',width:16,height:16,cursor:'pointer'}
                      }),
                      React.createElement('div', {style:{flex:1}},
                        React.createElement('div', {style:{fontSize:13,fontWeight:600,color:'var(--navy)'}}, t.name),
                        React.createElement('div', {style:{fontSize:11,fontFamily:'var(--mono)',color:statusColor,marginTop:2}}, statusLabel)
                      ),
                      !isReady && React.createElement('div', {style:{fontSize:11,color:'var(--amber)',fontWeight:600}}, 'Review before including')
                    );
                  })}
                </div>
                {(function() {
                  var selectedMeta = tabMeta.filter(function(t){ return selectedTabs[t.name] && t.status === 'ready'; });
                  var colCounts = selectedMeta.map(function(t){ return t.colCount; });
                  var allSame = colCounts.length > 1 && colCounts.every(function(c){ return c === colCounts[0]; });
                  var mixedCols = colCounts.length > 1 && !allSame;
                  return mixedCols ? React.createElement('div', {
                    style:{fontSize:12,color:'var(--amber)',background:'var(--amber-bg)',border:'1px solid var(--amber-bd)',borderRadius:6,padding:'8px 10px',marginBottom:10,fontFamily:'var(--mono)'}
                  }, '⚠ Selected sheets have different column counts. The mapping engine will handle this — unmapped columns will be flagged for review.') : null;
                })()}
                <div style={{display:'flex',gap:8}}>
                  <button className="btn btn-primary" onClick={function() {
                    var chosen = Object.keys(selectedTabs).filter(function(k){ return selectedTabs[k]; });
                    if (chosen.length === 0) { return; }
                    setShowTabPreview(false);
                    handleProcess(chosen);
                  }}>
                    Process {Object.values(selectedTabs).filter(Boolean).length} Sheet{Object.values(selectedTabs).filter(Boolean).length!==1?'s':''}
                  </button>
                  <button className="btn btn-secondary" onClick={function(){ setShowTabPreview(false); setTabMeta([]); setSelectedTabs({}); }}>
                    Cancel
                  </button>
                </div>
              </div>
            )}
            <p className="inline-note" style={{marginTop:8}}>CSV · Excel · Word · JSON · HTML: under 3s · PDF: up to 30s · Google Sheets: paste URL</p>
          </div>
        </div>

        <div>
          <div className="sidebar-card">
            <div className="sidebar-title">Mapping Library</div>
            <div className="stat-row"><span className="stat-label">Confirmed mappings</span><span className="stat-val">{libraryCount.toLocaleString()}</span></div>
            <div className="stat-row"><span className="stat-label">Internal fields</span><span className="stat-val">{schema.length}</span></div>
            <div className="stat-row"><span className="stat-label">Status</span><span className="badge badge-green" style={{fontSize:10}}>Ready</span></div>
          </div>

          <div className="sidebar-card" style={{marginTop:16}}>
            <div className="sidebar-title">Supported Formats</div>
            {[
              {fmt:'CSV / TSV', label:'Live', ready:true},
              {fmt:'Excel .xlsx', label:'Live', ready:true},
              {fmt:'Word .docx', label:'Live', ready:true},
              {fmt:'PDF', label:'Live*', ready:true},
              {fmt:'JSON', label:'Live', ready:true},
              {fmt:'HTML table', label:'Live', ready:true},
              {fmt:'Google Sheets', label:'Live', ready:true},
            ].map(function(item) { return (
              <div key={item.fmt} className="stat-row">
                <span className="stat-label" style={{fontFamily:'var(--mono)',fontSize:11}}>{item.fmt}</span>
                <span className={`badge ${item.ready?'badge-green':'badge-grey'}`} style={{fontSize:10}}>{item.label}</span>
              </div>
            ); })}
            <p style={{fontSize:10,color:'var(--text-3)',fontFamily:'var(--mono)',marginTop:8}}>* PDF requires Cloudflare Worker deployment</p>
          </div>

          <div className="sidebar-card" style={{marginTop:16}}>
            <div className="sidebar-title">Quick Start</div>
            {['Upload or paste your RFP document','Review the field mapping suggestions','Confirm or correct each mapping','Export the normalised output'].map((s,i)=>(
              <div key={i} style={{display:'flex',gap:10,alignItems:'flex-start',marginBottom:10}}>
                <div style={{width:20,height:20,borderRadius:'50%',background:'var(--accent)',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700,flexShrink:0}}>{i+1}</div>
                <span style={{fontSize:12,color:'var(--text-2)'}}>{s}</span>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

// ── MAPPING REVIEW VIEW ────────────────────────────────────────────────────
function MappingReviewView({ session, schema, onConfirmMapping, onComplete, toast }) {
  const { results: initialResults, clientName, sourceFormat, normLog } = session;
  const [results, setResults] = useState(initialResults.map(function(r) { return Object.assign({}, r); }));
  const [saving, setSaving] = useState({});

  const schemaFields = schema.map(function(s) { return s.FieldName; });
  const schemaDisplayMap = {};
  schema.forEach(function(s) { schemaDisplayMap[s.FieldName] = s.DisplayName || s.FieldName; });

  const greenItems = results.filter(r => r.tier==='green' && !r.skipped);
  const amberItems = results.filter(r => r.tier==='amber' && !r.skipped);
  const redItems   = results.filter(r => r.tier==='red'   && !r.skipped);
  const greyItems  = results.filter(r => r.tier==='grey'  && !r.skipped);
  const confirmed  = results.filter(r => r.confirmed);
  const skipped    = results.filter(r => r.skipped);
  const total      = results.filter(r => !r.skipped).length;
  const progress   = total > 0 ? Math.round((confirmed.length / total) * 100) : 0;
  const allDone    = confirmed.length === total;

  function updateField(sourceField, internalField) {
    setResults(prev => prev.map(r => r.sourceField===sourceField ? {...r, internalField} : r));
  }

  async function confirmOne(sourceField) {
    const row = results.find(r => r.sourceField===sourceField);
    if (!row || !row.internalField) { toast.add('Select an internal field first', 'error'); return; }
    if (row.confirmed) return; // Idempotency guard — prevent double-save
    setSaving(p => ({...p,[sourceField]:true}));
    // Optimistic update
    setResults(prev => prev.map(r => r.sourceField===sourceField ? {...r, confirmed:true} : r));
    try {
      await onConfirmMapping(row);
      toast.add(`Mapped: ${sourceField} → ${row.internalField}`, 'success');
    } catch(e) {
      toast.add('Save failed — check connection', 'error');
      setResults(prev => prev.map(r => r.sourceField===sourceField ? {...r, confirmed:false} : r));
    }
    setSaving(p => ({...p,[sourceField]:false}));
  }

  async function confirmAllGreen() {
    const toConfirm = greenItems.filter(r => !r.confirmed && r.internalField);
    for (const row of toConfirm) {
      setResults(prev => prev.map(r => r.sourceField===row.sourceField ? {...r, confirmed:true} : r));
      try { await onConfirmMapping(row); } catch(e) {}
    }
    toast.add(`Confirmed ${toConfirm.length} auto-mapped fields`, 'success');
  }

  function skipField(sourceField) {
    setResults(prev => prev.map(r => r.sourceField===sourceField ? {...r, skipped:true, confirmed:false} : r));
  }

  function renderSection(items, label, dotClass, badgeClass) {
    if (items.length === 0) return null;
    var dotColor = dotClass==='dot-green'?'var(--green)':dotClass==='dot-amber'?'var(--amber)':dotClass==='dot-red'?'var(--red)':'var(--grey)';
    return (
      <React.Fragment key={label}>
        <tr>
          <td colSpan={6} style={{padding:0}}>
            <div className="section-divider">
              <span className={'tier-dot ' + dotClass}/>
              <span className="section-divider-label" style={{color: dotColor}}>{label}</span>
              <span className={'badge ' + badgeClass} style={{fontSize:10}}>{items.length} field{items.length!==1?'s':''}</span>
            </div>
          </td>
        </tr>
        {items.map(function(row) {
          var confColor = row.tier==='green'?'var(--green)':row.tier==='amber'?'var(--amber)':row.tier==='red'?'var(--red)':'var(--grey)';
          return (
            <tr key={row.sourceField} className={'map-row-' + row.tier + (row.confirmed?' row-confirmed':'')}>
              <td>
                <span className="source-field">{row.sourceField}</span>
                {row.mappingTier === 2 && <span style={{marginLeft:6,fontSize:9,fontFamily:'var(--mono)',color:'var(--accent)',background:'rgba(16,124,16,0.08)',padding:'1px 5px',borderRadius:3}}>T2</span>}
                {row.mappingTier === 3 && <span style={{marginLeft:6,fontSize:9,fontFamily:'var(--mono)',color:'#6D28D9',background:'#F3E8FF',padding:'1px 5px',borderRadius:3}}>T3</span>}
                {row.ambiguous && <span style={{marginLeft:4,fontSize:9,fontFamily:'var(--mono)',color:'var(--amber)',background:'var(--amber-bg)',padding:'1px 5px',borderRadius:3}}>~</span>}
                {row.llmExplanation && <div style={{fontSize:10,color:'var(--text-3)',marginTop:3,fontStyle:'italic',maxWidth:240}}>{row.llmExplanation}</div>}
              </td>
              <td><span className="sample-val" title={row.sampleValue}>{row.sampleValue || <span style={{color:'var(--text-3)'}}>—</span>}</span></td>
              <td>
                {row.confidence > 0
                  ? <span className="conf-score" style={{color: confColor}}>
                      {row.tier==='green' && row.mappingTier===1 ? '100%' : Math.round(row.confidence*100)+'%'}
                    </span>
                  : <span style={{color:'var(--text-3)',fontSize:11,fontFamily:'var(--mono)'}}>—</span>
                }
              </td>
              <td>
                {row.confirmed
                  ? <span className="badge badge-green" style={{fontSize:10}}>✓ Confirmed</span>
                  : <select className="internal-select" value={row.internalField}
                      onChange={function(e) { updateField(row.sourceField, e.target.value); }}>
                      <option value="">— Select internal field —</option>
                      {row.top3 && row.top3.length > 0 && row.tier !== 'green' && (
                        <optgroup label="Suggested matches">
                          {row.top3.map(function(s) {
                            return <option key={s.internalField} value={s.internalField}>{s.internalField} ({Math.round(s.score*100)}%)</option>;
                          })}
                        </optgroup>
                      )}
                      <optgroup label="All internal fields">
                        {schemaFields.map(function(f) { return <option key={f} value={f}>{f}</option>; })}
                      </optgroup>
                    </select>
                }
              </td>
              <td>
                <div className="action-cell">
                  {!row.confirmed && (
                    <React.Fragment>
                      <button className="btn-confirm" onClick={function() { confirmOne(row.sourceField); }} disabled={saving[row.sourceField]||!row.internalField}>
                        {saving[row.sourceField]?'Saving…':'Confirm'}
                      </button>
                      <button className="btn-skip" onClick={function() { skipField(row.sourceField); }}>Skip</button>
                    </React.Fragment>
                  )}
                </div>
              </td>
            </tr>
          );
        })}
      </React.Fragment>
    );
  }

  return (
    <div>
      <div className="mapping-header">
        <div>
          <h2 style={{fontSize:20,fontWeight:700,color:'var(--navy)',marginBottom:4}}>Mapping Review</h2>
          <p style={{fontSize:12,color:'var(--text-3)',fontFamily:'var(--mono)'}}>
            {clientName || 'Unknown client'} · {sourceFormat} · {results.length} fields detected
          </p>
        </div>
        <div style={{display:'flex',gap:10,alignItems:'center',flexWrap:'wrap'}}>
          <div className="mapping-counts">
            <span className="badge badge-green">{greenItems.length} auto</span>
            <span className="badge badge-amber">{amberItems.length} suggested</span>
            <span className="badge badge-red">{redItems.length} review</span>
            <span className="badge badge-grey">{greyItems.length} unknown</span>
          </div>
          {greenItems.filter(r=>!r.confirmed).length > 0 && (
            <button className="btn btn-green btn-sm" onClick={confirmAllGreen}>
              ✓ Confirm All Green ({greenItems.filter(r=>!r.confirmed).length})
            </button>
          )}
        </div>
      </div>

      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:8}}>
        <div className="progress-bar-wrap" style={{flex:1}}>
          <div className="progress-bar-fill" style={{width:progress+'%'}}/>
        </div>
        <span style={{fontFamily:'var(--mono)',fontSize:12,color:'var(--text-2)',whiteSpace:'nowrap'}}>
          {confirmed.length} / {total} confirmed
        </span>
      </div>

      <div className="card" style={{marginBottom:20}}>
        <div style={{overflowX:'auto'}}>
          <table className="mapping-table">
            <thead>
              <tr>
                <th style={{width:'22%'}}>Source Field</th>
                <th style={{width:'18%'}}>Sample Value</th>
                <th style={{width:'8%'}}>Match</th>
                <th style={{width:'28%'}}>Internal Field</th>
                <th style={{width:'14%'}}>Action</th>
              </tr>
            </thead>
            <tbody>
              {renderSection(greenItems, 'Auto-Mapped — Confidence 100%', 'dot-green', 'badge-green')}
              {renderSection(amberItems, 'Suggested — Review Recommended', 'dot-amber', 'badge-amber')}
              {renderSection(redItems,   'Review Queue — Low Confidence', 'dot-red',   'badge-red')}
              {renderSection(greyItems,  'Unknown — Manual Selection Required', 'dot-grey', 'badge-grey')}
              {skipped.length > 0 && (
                <tr>
                  <td colSpan={6} style={{padding:'10px 14px',fontSize:12,color:'var(--text-3)',fontFamily:'var(--mono)'}}>
                    {skipped.length} field{skipped.length!==1?'s':''} skipped
                  </td>
                </tr>
              )}
            </tbody>
          </table>
        </div>
      </div>

      {normLog.length > 0 && (
        <NormLog entries={normLog} />
      )}

      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:20}}>
        <span style={{fontSize:12,color:'var(--text-3)',fontFamily:'var(--mono)'}}>
          {allDone ? '✓ All fields confirmed — ready to export' : `${total - confirmed.length} field${total-confirmed.length!==1?'s':''} remaining`}
        </span>
        <button className="btn btn-primary" disabled={!allDone}
          onClick={()=>onComplete(results, normLog)}
          style={{padding:'10px 28px',fontSize:14}}>
          → View Normalised Output
        </button>
      </div>
    </div>
  );
}

function NormLog({ entries }) {
  const [open, setOpen] = useState(false);
  return (
    <div className="norm-log">
      <div className="norm-log-header" onClick={()=>setOpen(!open)}>
        <span>Value Normalisation Log ({entries.length} normalisation{entries.length!==1?'s':''} applied)</span>
        <span className={`collapsible-arrow ${open?'open':''}`}>▾</span>
      </div>
      {open && (
        <div className="norm-log-body">
          {entries.map((e,i) => (
            <div key={i} className="norm-log-row">
              <span style={{color:'var(--text-2)',fontSize:11}}>{e.field}</span>
              <span className="norm-original">{e.original}</span>
              <span className="norm-arrow">→</span>
              <span className="norm-result">{e.normalised}</span>
              <span className="badge badge-navy" style={{fontSize:10}}>{e.type}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ── OUTPUT VIEW ────────────────────────────────────────────────────────────
function OutputView({ results, normLog, session, setSession, schema, onReset, appendLog, saveOutput, toast, appendRowLog }) {
  const confirmed = results.filter(r => r.confirmed && r.internalField);
  const schemaFields = schema;
  const requiredFields = schemaFields.filter(f => f.Required === 'Yes');
  const mappedFieldNames = new Set(confirmed.map(r => r.internalField));
  const missingRequired = requiredFields.filter(f => !mappedFieldNames.has(f.FieldName));
  const [pushing, setPushing] = useState(false);
  const [pushed, setPushed] = useState(false);

  // Build output row
  const outputRow = {};
  confirmed.forEach(r => { outputRow[r.internalField] = r.sampleValue; });

  // Apply normalisations
  normLog.forEach(n => {
    if (outputRow[n.field] !== undefined) outputRow[n.field] = n.normalised;
  });

  // Full normalised rows from session — used for Excel export
  var normalisedRows = (session && session.normalisedRows) ? session.normalisedRows : [outputRow];

  // Write ProcessingLog once on mount
  const logWritten = useRef(false);
  const sessionLogIdRef = useRef(null);
  useEffect(() => {
    if (!logWritten.current) {
      logWritten.current = true;
      const autoMapped = results.filter(r => r.tier==='green' && r.confirmed).length;
      const reviewed   = results.filter(r => r.tier!=='green' && r.confirmed).length;
      const unknown    = results.filter(r => !r.confirmed && !r.skipped).length;
      var rTotal = normalisedRows.length;
      var rAuto  = normalisedRows.filter(function(r) {
        return Object.values(r).some(function(v) { return v && v !== ''; });
      }).length;
      var logId2 = newLogId();
      sessionLogIdRef.current = logId2;
      appendLog({
        logId: logId2,
        fieldsTotal: results.length,
        fieldsAutoMapped: autoMapped,
        fieldsReviewed: reviewed,
        fieldsUnknown: unknown,
        rowsTotal: rTotal,
        rowsAutoNormalised: rAuto,
        rowsReviewed: reviewed,
        rowsUnknown: unknown,
        clientName: session.clientName || '',
        sourceFormat: session.sourceFormat || '',
      });
      // Write one RowProcessingLog entry per asset row (non-blocking)
      if (appendRowLog && normalisedRows && normalisedRows.length > 0) {
        appendRowLog(logId2, normalisedRows, session);
      }
    }
  }, []);

  function downloadExcel() {
    try {
      var headers = schemaFields.map(function(f) { return f.DisplayName || f.FieldName; });
      var fieldNames = schemaFields.map(function(f) { return f.FieldName; });
      // Build array of arrays: header row + one row per asset
      var sheetData = [headers];
      normalisedRows.forEach(function(row) {
        var rowArr = fieldNames.map(function(fn) {
          var v = row[fn];
          if (v === undefined || v === null) return '';
          var s = String(v);
          // Formula injection guard
          if (/^[=+@\-]/.test(s)) s = "'" + s;
          return s;
        });
        sheetData.push(rowArr);
      });
      var ws = XLSX.utils.aoa_to_sheet(sheetData);
      // Auto column widths
      var colWidths = headers.map(function(h, i) {
        var maxLen = h.length;
        normalisedRows.forEach(function(row) {
          var v = String(row[fieldNames[i]] || '');
          if (v.length > maxLen) maxLen = v.length;
        });
        return { wch: Math.min(maxLen + 2, 40) };
      });
      ws['!cols'] = colWidths;
      var wb2 = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb2, ws, 'Normalised Output');
      var clientStr = (session && session.clientName) ? session.clientName.replace(/[^a-zA-Z0-9]/g,'_') : 'Output';
      var dateStr = new Date().toISOString().slice(0,10);
      XLSX.writeFile(wb2, 'RFP_Normalised_' + clientStr + '_' + dateStr + '.xlsx');
      toast.add(normalisedRows.length + ' rows exported to Excel', 'success');
    } catch(e) {
      toast.add('Excel export failed: ' + e.message, 'error');
    }
  }

  async function handlePushToOneDrive() {
    // Layer 2: same-session navigation guard
    if (session && session.outputSaved) {
      toast.add('This iteration was already saved to OneDrive. No duplicate was created.', 'success');
      return;
    }
    setPushing(true);
    try {
      await saveOutput(outputRow, schemaFields, session, sessionLogIdRef.current);
      setPushed(true);
      // Mark session as saved (Layer 2 guard for same-session navigation)
      if (setSession) setSession(function(prev) { return Object.assign({}, prev, { outputSaved: true }); });
      toast.add('Record saved to NormalisedOutputs in OneDrive', 'success');
    } catch(e) {
      if (e.message === 'ALREADY_SAVED') {
        setPushed(true);
        toast.add('This iteration was already saved to OneDrive. No duplicate was created.', 'success');
      } else {
        toast.add('Save to OneDrive failed: ' + e.message, 'error');
      }
    }
    setPushing(false);
  }

  return (
    <div>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20,flexWrap:'wrap',gap:12}}>
        <div>
          <h2 style={{fontSize:20,fontWeight:700,color:'var(--navy)',marginBottom:4}}>Normalised Output</h2>
          <p style={{fontSize:12,color:'var(--text-3)',fontFamily:'var(--mono)'}}>
            {session.clientName||'Unknown client'} · {confirmed.length} of {results.length} fields mapped
          </p>
        </div>
        <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
          <button className="btn btn-secondary" onClick={onReset}>← Process Another Document</button>
          <button className="btn btn-secondary" onClick={downloadExcel}>↓ Export as Excel ({normalisedRows.length} rows)</button>
          <button className="btn btn-primary" onClick={handlePushToOneDrive} disabled={pushing||pushed}>
            {pushed ? '✓ Saved to OneDrive' : pushing ? 'Saving…' : '☁ Save to OneDrive'}
          </button>
        </div>
      </div>

      {missingRequired.length > 0 && (
        <div className="output-banner warning" style={{marginBottom:20}}>
          <span style={{fontSize:18}}>⚠</span>
          <div>
            <div className="output-banner-text">
              {missingRequired.length} required field{missingRequired.length!==1?'s':''} missing from source document
            </div>
            <div style={{fontSize:12,color:'var(--amber)',fontFamily:'var(--mono)',marginTop:3}}>
              {missingRequired.map(f=>f.DisplayName||f.FieldName).join(' · ')}
            </div>
          </div>
        </div>
      )}

      {missingRequired.length === 0 && (
        <div className="output-banner success" style={{marginBottom:20}}>
          <span style={{fontSize:18}}>✓</span>
          <div className="output-banner-text">All required fields present — record is complete</div>
        </div>
      )}

      <div className="card">
        <div className="card-header" style={{padding:'14px 20px'}}>
          <div>
            <div className="card-title" style={{fontSize:13}}>Normalised Record — Internal Schema Format</div>
            <div className="card-sub">Stored in NormalisedOutputs table on OneDrive when saved · * = required field</div>
          </div>
        </div>
        <div className="output-table-wrap">
          <table className="output-table">
            <thead>
              <tr>
                {schemaFields.map(f => {
                  const missing = f.Required==='Yes' && !mappedFieldNames.has(f.FieldName);
                  return (
                    <th key={f.FieldName} className={missing?'required-missing':''} title={f.Description||''}>
                      {f.DisplayName||f.FieldName}
                      {f.Required==='Yes' && <span style={{opacity:0.7,marginLeft:3}}>*</span>}
                    </th>
                  );
                })}
              </tr>
            </thead>
            <tbody>
              <tr>
                {schemaFields.map(f => {
                  const val = outputRow[f.FieldName];
                  const missing = f.Required==='Yes' && !mappedFieldNames.has(f.FieldName);
                  return (
                    <td key={f.FieldName} className={missing?'empty-required':''}>
                      {val || (missing ? 'MISSING' : <span style={{color:'var(--text-3)'}}>—</span>)}
                    </td>
                  );
                })}
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      {normLog.length > 0 && (
        <div style={{marginTop:20}}>
          <NormLog entries={normLog} />
        </div>
      )}
    </div>
  );
}

// ── LIBRARY VIEW ──────────────────────────────────────────────────────────
function LibraryView({ library, schema, onAddMapping, toast }) {
  const [search, setSearch] = useState('');
  const [filterField, setFilterField] = useState('');
  const [page, setPage] = useState(1);
  const [showAdd, setShowAdd] = useState(false);
  const [newSource, setNewSource] = useState('');
  const [newInternal, setNewInternal] = useState('');
  const [adding, setAdding] = useState(false);
  const PAGE_SIZE = 50;

  const filtered = useMemo(() => {
    let rows = library;
    if (search) { const s=search.toLowerCase(); rows=rows.filter(r=>(r.SourceField && r.SourceField.toLowerCase().includes(s))||(r.InternalField && r.InternalField.toLowerCase().includes(s))); }
    if (filterField) rows=rows.filter(r=>r.InternalField===filterField);
    return rows;
  }, [library, search, filterField]);

  const paged = filtered.slice((page-1)*PAGE_SIZE, page*PAGE_SIZE);
  const totalPages = Math.ceil(filtered.length / PAGE_SIZE);

  async function handleAdd() {
    if (!newSource.trim() || !newInternal) { toast.add('Fill in both fields', 'error'); return; }
    setAdding(true);
    try {
      await onAddMapping({ SourceField: newSource.trim(), InternalField: newInternal });
      toast.add(`Added: ${newSource} → ${newInternal}`, 'success');
      setNewSource(''); setNewInternal(''); setShowAdd(false);
    } catch(e) { toast.add('Failed to add mapping', 'error'); }
    setAdding(false);
  }

  const schemaFields = schema.map(s => s.FieldName);

  return (
    <div>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20,flexWrap:'wrap',gap:12}}>
        <div>
          <h2 style={{fontSize:20,fontWeight:700,color:'var(--navy)',marginBottom:4}}>Mapping Library</h2>
          <p style={{fontSize:12,color:'var(--text-3)',fontFamily:'var(--mono)'}}>
            {library.length.toLocaleString()} confirmed mappings
          </p>
        </div>
        <button className="btn btn-primary btn-sm" onClick={()=>setShowAdd(!showAdd)}>
          {showAdd?'✕ Cancel':'+ Add Mapping'}
        </button>
      </div>

      {showAdd && (
        <div className="card" style={{marginBottom:20}}>
          <div className="card-body">
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr auto',gap:12,alignItems:'end'}}>
              <div>
                <label className="form-label">Source Field</label>
                <input className="form-input" value={newSource} onChange={e=>setNewSource(e.target.value)} placeholder="e.g. Client Ref No" />
              </div>
              <div>
                <label className="form-label">Internal Field</label>
                <select className="form-select" value={newInternal} onChange={e=>setNewInternal(e.target.value)}>
                  <option value="">— Select —</option>
                  {schemaFields.map(f=><option key={f} value={f}>{f}</option>)}
                </select>
              </div>
              <button className="btn btn-primary" onClick={handleAdd} disabled={adding}>
                {adding?'Saving…':'Save'}
              </button>
            </div>
          </div>
        </div>
      )}

      <div className="card">
        <div className="card-body" style={{paddingBottom:12}}>
          <div className="lib-toolbar">
            <input className="form-input lib-search" placeholder="Search source or internal field…"
              value={search} onChange={e=>{setSearch(e.target.value);setPage(1);}} />
            <select className="form-select" style={{width:220}} value={filterField} onChange={e=>{setFilterField(e.target.value);setPage(1);}}>
              <option value="">All internal fields</option>
              {schemaFields.map(f=><option key={f} value={f}>{f}</option>)}
            </select>
            <span style={{fontFamily:'var(--mono)',fontSize:12,color:'var(--text-3)',whiteSpace:'nowrap'}}>
              {filtered.length} result{filtered.length!==1?'s':''}
            </span>
          </div>
        </div>
        <div style={{overflowX:'auto'}}>
          <table className="lib-table">
            <thead>
              <tr>
                <th>Source Field</th>
                <th>Internal Field</th>
                <th>Confidence</th>
                <th>Source</th>
                <th>Client</th>
                <th>Date Added</th>
                <th>Added By</th>
              </tr>
            </thead>
            <tbody>
              {paged.length === 0 && (
                <tr><td colSpan={7} style={{padding:'40px',textAlign:'center',color:'var(--text-3)',fontFamily:'var(--mono)',fontSize:12}}>No mappings found</td></tr>
              )}
              {paged.map((row, i) => (
                <tr key={i}>
                  <td style={{color:'var(--text)'}}>{row.SourceField}</td>
                  <td><span className="badge badge-navy" style={{fontSize:10}}>{row.InternalField}</span></td>
                  <td><span style={{color:'var(--green)',fontWeight:600}}>{row.Confidence>=1?'100%':Math.round(row.Confidence*100)+'%'}</span></td>
                  <td><span className="badge badge-grey" style={{fontSize:10}}>{row.Source||'—'}</span></td>
                  <td style={{color:'var(--text-3)'}}>{row.ClientId||'—'}</td>
                  <td style={{color:'var(--text-3)'}}>{row.DateAdded||'—'}</td>
                  <td style={{color:'var(--text-3)'}}>{row.AddedBy||'—'}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
        {totalPages > 1 && (
          <div className="card-body lib-paginator">
            <span className="lib-page-info">Page {page} of {totalPages} · {filtered.length} rows</span>
            <div style={{display:'flex',gap:6}}>
              <button className="btn btn-secondary btn-sm" onClick={()=>setPage(p=>Math.max(1,p-1))} disabled={page===1}>← Prev</button>
              <button className="btn btn-secondary btn-sm" onClick={()=>setPage(p=>Math.min(totalPages,p+1))} disabled={page===totalPages}>Next →</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// PROCESSING LOG VIEW
// ══════════════════════════════════════════════════════════════════════════
function ProcessingLogView({ processingLog }) {
  const [search, setSearch] = useState('');
  const [page, setPage] = useState(0);
  const PAGE = 20;

  var filtered = processingLog.filter(function(r) {
    if (!search) return true;
    var s = search.toLowerCase();
    return (r.ClientId||'').toLowerCase().includes(s) ||
           (r.SourceFormat||'').toLowerCase().includes(s) ||
           (r.ProcessedBy||'').toLowerCase().includes(s) ||
           (r.DateProcessed||'').includes(s);
  }).slice().reverse(); // newest first

  var pages = Math.ceil(filtered.length / PAGE) || 1;
  var paged = filtered.slice(page * PAGE, (page+1) * PAGE);

  function exportLog() {
    var headers = ['LogId','ClientId','DateProcessed','SourceFormat','FieldsTotal','FieldsAutoMapped','FieldsReviewed','FieldsUnknown','ProcessedBy'];
    var rows = processingLog.map(function(r) {
      return headers.map(function(h) { return '"' + String(r[h]||'').replace(/"/g,'""') + '"'; }).join(',');
    });
    var csv = [headers.join(',')].concat(rows).join('\n');
    var blob = new Blob([csv], { type: 'text/csv' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url; a.download = 'ProcessingLog_' + new Date().toISOString().slice(0,10) + '.csv';
    a.click(); URL.revokeObjectURL(url);
  }

  return (
    <div>
      <div style={{marginBottom:24,display:'flex',alignItems:'flex-start',justifyContent:'space-between'}}>
        <div>
          <h2 style={{fontSize:20,fontWeight:700,color:'var(--navy)',marginBottom:4}}>Processing Log</h2>
          <p style={{fontSize:12,color:'var(--text-3)'}}>{processingLog.length} entries · Full audit trail of all documents processed</p>
        </div>
        <button className="btn btn-secondary" onClick={exportLog}>↓ Export CSV</button>
      </div>
      <div className="card" style={{marginBottom:16}}>
        <div style={{padding:'12px 16px'}}>
          <input className="form-input" placeholder="Search by client, format, user or date…"
            value={search} onChange={function(e){setSearch(e.target.value);setPage(0);}}
            style={{width:'100%',maxWidth:400}} />
        </div>
      </div>
      <div className="card">
        <div style={{overflowX:'auto'}}>
          <table className="schema-table">
            <thead><tr>
              <th>Date</th><th>Client</th><th>Format</th>
              <th style={{textAlign:'right'}}>Total</th>
              <th style={{textAlign:'right'}}>Auto</th>
              <th style={{textAlign:'right'}}>Reviewed</th>
              <th style={{textAlign:'right'}}>Unknown</th>
              <th>Processed By</th>
            </tr></thead>
            <tbody>
              {paged.length === 0 && (
                <tr><td colSpan={8} style={{textAlign:'center',color:'var(--text-3)',padding:'32px'}}>
                  {processingLog.length === 0 ? 'No processing history yet — process your first document to start the log' : 'No results match your search'}
                </td></tr>
              )}
              {paged.map(function(r, i) {
                var auto = parseInt(r.FieldsAutoMapped) || 0;
                var total = parseInt(r.FieldsTotal) || 1;
                var rate = Math.round(auto / total * 100);
                return (
                  <tr key={r.LogId || i}>
                    <td style={{color:'var(--text-2)',fontSize:12}}>{r.DateProcessed||'—'}</td>
                    <td style={{fontWeight:600}}>{r.ClientId||'Unknown'}</td>
                    <td><span className="badge badge-navy" style={{fontSize:10}}>{r.SourceFormat||'—'}</span></td>
                    <td style={{textAlign:'right'}}>{r.FieldsTotal||0}</td>
                    <td style={{textAlign:'right',color:'var(--green)',fontWeight:600}}>{r.FieldsAutoMapped||0}</td>
                    <td style={{textAlign:'right',color:'var(--amber)'}}>{r.FieldsReviewed||0}</td>
                    <td style={{textAlign:'right',color:'var(--red)'}}>{r.FieldsUnknown||0}</td>
                    <td style={{fontSize:12,color:'var(--text-3)'}}>{r.ProcessedBy||'—'}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
        {pages > 1 && (
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'12px 16px',borderTop:'1px solid var(--border)'}}>
            <span style={{fontSize:12,color:'var(--text-3)'}}>Page {page+1} of {pages} · {filtered.length} entries</span>
            <div style={{display:'flex',gap:6}}>
              <button className="btn btn-secondary" onClick={function(){setPage(function(p){return Math.max(0,p-1);});}} disabled={page===0}>← Prev</button>
              <button className="btn btn-secondary" onClick={function(){setPage(function(p){return Math.min(pages-1,p+1);});}} disabled={page===pages-1}>Next →</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// BULK PRE-LOAD VIEW
// ══════════════════════════════════════════════════════════════════════════
function BulkPreloadView({ schema, library, onBulkAdd, toast }) {
  const [pasteText, setPasteText] = useState('');
  const [preview, setPreview] = useState([]);
  const [result, setResult] = useState(null);
  const [saving, setSaving] = useState(false);
  const fieldNames = schema.map(function(s) { return s.FieldName; });

  function parseInput(text) {
    if (!text.trim()) { setPreview([]); return; }
    var lines = text.trim().split('\n');
    var rows = [];
    lines.forEach(function(line) {
      var parts = line.split(',');
      if (parts.length >= 2) {
        var sf = parts[0].trim();
        var inf = parts[1].trim();
        var cid = parts[2] ? parts[2].trim() : '';
        var valid = fieldNames.includes(inf);
        rows.push({ SourceField: sf, InternalField: inf, ClientId: cid, valid: valid });
      }
    });
    setPreview(rows);
    setResult(null);
  }

  async function handleSave() {
    var valid = preview.filter(function(r) { return r.valid; });
    if (valid.length === 0) { toast.add('No valid rows to save', 'error'); return; }
    setSaving(true);
    try {
      var res = await onBulkAdd(valid);
      setResult(res);
      setPasteText('');
      setPreview([]);
      toast.add('Bulk pre-load complete: ' + res.added + ' added, ' + res.skipped + ' skipped', 'success');
    } catch(e) {
      toast.add('Bulk save failed: ' + e.message, 'error');
    }
    setSaving(false);
  }

  return (
    <div>
      <div style={{marginBottom:24}}>
        <h2 style={{fontSize:20,fontWeight:700,color:'var(--navy)',marginBottom:4}}>Bulk Pre-load</h2>
        <p style={{fontSize:12,color:'var(--text-3)'}}>Paste known field name variations to add them to the mapping library in bulk</p>
      </div>
      <div className="card" style={{marginBottom:16}}>
        <div className="card-header">
          <div className="card-title">Paste Mappings</div>
          <div className="card-sub">One mapping per line: SourceField, InternalField, ClientId (optional)</div>
        </div>
        <div className="card-body">
          <textarea className="form-input" rows={10} placeholder="Client Name, CustomerName&#10;Agreement Start, ContractStartDate&#10;Facility, SiteName, CLIENT-001"
            value={pasteText}
            onChange={function(e) { setPasteText(e.target.value); parseInput(e.target.value); }}
            style={{width:'100%',fontFamily:'var(--mono)',fontSize:12}} />
          <div style={{marginTop:8,fontSize:12,color:'var(--text-3)'}}>
            Valid internal fields: {fieldNames.slice(0,8).join(', ')}…
          </div>
        </div>
      </div>
      {preview.length > 0 && (
        <div className="card" style={{marginBottom:16}}>
          <div className="card-header">
            <div className="card-title">Preview — {preview.length} rows</div>
            <div className="card-sub">
              <span style={{color:'var(--green)'}}>{preview.filter(function(r){return r.valid;}).length} valid</span>
              {' · '}
              <span style={{color:'var(--red)'}}>{preview.filter(function(r){return !r.valid;}).length} invalid InternalField</span>
            </div>
          </div>
          <div style={{overflowX:'auto'}}>
            <table className="schema-table">
              <thead><tr><th>Source Field</th><th>Internal Field</th><th>Client ID</th><th>Status</th></tr></thead>
              <tbody>
                {preview.map(function(r, i) {
                  return (
                    <tr key={i}>
                      <td style={{fontWeight:600}}>{r.SourceField}</td>
                      <td style={{color: r.valid ? 'var(--green)' : 'var(--red)'}}>{r.InternalField}</td>
                      <td style={{color:'var(--text-3)'}}>{r.ClientId||'—'}</td>
                      <td>
                        {r.valid
                          ? <span style={{color:'var(--green)',fontSize:12,fontWeight:600}}>✓ Valid</span>
                          : <span style={{color:'var(--red)',fontSize:12}}>✗ Unknown field</span>}
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
          <div style={{padding:'12px 16px',borderTop:'1px solid var(--border)',display:'flex',justifyContent:'flex-end'}}>
            <button className="btn btn-primary" onClick={handleSave} disabled={saving || preview.filter(function(r){return r.valid;}).length===0}>
              {saving ? 'Saving…' : 'Save ' + preview.filter(function(r){return r.valid;}).length + ' mappings to library'}
            </button>
          </div>
        </div>
      )}
      {result && (
        <div style={{padding:'12px 16px',background:'var(--green-bg)',border:'1px solid var(--green-bd)',borderRadius:'var(--radius)'}}>
          <span style={{color:'var(--green)',fontWeight:600}}>Done — {result.added} mappings added, {result.skipped} skipped (already existed or invalid)</span>
        </div>
      )}
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════════════
// DASHBOARD VIEW
// ══════════════════════════════════════════════════════════════════════════
function DashboardView({ processingLog, library }) {
  // Calculate metrics from ProcessingLog
  var total = processingLog.length;
  var totalFields = processingLog.reduce(function(s,r){ return s + (parseInt(r.FieldsTotal)||0); }, 0);
  var totalAuto   = processingLog.reduce(function(s,r){ return s + (parseInt(r.FieldsAutoMapped)||0); }, 0);
  var totalReview = processingLog.reduce(function(s,r){ return s + (parseInt(r.FieldsReviewed)||0); }, 0);
  var totalUnknown= processingLog.reduce(function(s,r){ return s + (parseInt(r.FieldsUnknown)||0); }, 0);
  var autoRate    = totalFields > 0 ? Math.round(totalAuto / totalFields * 100) : 0;
  var reviewRate  = totalFields > 0 ? Math.round(totalReview / totalFields * 100) : 0;
  var unknownRate = totalFields > 0 ? Math.round(totalUnknown / totalFields * 100) : 0;

  // Format breakdown
  var formats = {};
  processingLog.forEach(function(r) {
    var f = r.SourceFormat || 'Unknown';
    formats[f] = (formats[f] || 0) + 1;
  });
  var formatRows = Object.keys(formats).sort(function(a,b){ return formats[b]-formats[a]; });

  // Recent trend — last 10 docs auto-map rate
  var recent = processingLog.slice().reverse().slice(0,10);
  var recentRate = recent.length > 0
    ? Math.round(recent.reduce(function(s,r){ return s + (parseInt(r.FieldsAutoMapped)||0); },0) /
        Math.max(1, recent.reduce(function(s,r){ return s + (parseInt(r.FieldsTotal)||0); },0)) * 100)
    : 0;

  function StatCard(props) {
    return (
      <div className="card" style={{flex:1,minWidth:160}}>
        <div className="card-body" style={{textAlign:'center'}}>
          <div style={{fontSize:36,fontWeight:700,color:props.color||'var(--navy)',lineHeight:1}}>{props.value}</div>
          <div style={{fontSize:12,color:'var(--text-3)',marginTop:8}}>{props.label}</div>
          {props.sub && <div style={{fontSize:11,color:'var(--text-3)',marginTop:4}}>{props.sub}</div>}
        </div>
      </div>
    );
  }

  function Bar(props) {
    return (
      <div style={{marginBottom:12}}>
        <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
          <span style={{fontSize:13,color:'var(--text)'}}>{props.label}</span>
          <span style={{fontSize:13,fontWeight:600,color:props.color}}>{props.pct}%</span>
        </div>
        <div style={{height:8,background:'var(--grey-bg)',borderRadius:4,overflow:'hidden'}}>
          <div style={{height:'100%',width:props.pct+'%',background:props.color,borderRadius:4,transition:'width 0.5s'}}/>
        </div>
      </div>
    );
  }

  if (total === 0) {
    return (
      <div>
        <h2 style={{fontSize:20,fontWeight:700,color:'var(--navy)',marginBottom:4}}>Mapping Accuracy Dashboard</h2>
        <div className="card" style={{marginTop:24}}>
          <div className="card-body" style={{textAlign:'center',padding:'48px 24px'}}>
            <div style={{fontSize:32,marginBottom:12}}>📊</div>

      </div>

      <div style={{display:'flex',gap:16,marginBottom:16,flexWrap:'wrap'}}>
        <StatCard value={autoRate + '%'} label="Auto-Map Rate" sub="All time" color="var(--green)" />
        <StatCard value={recentRate + '%'} label="Recent Auto-Map" sub="Last 10 documents" color="var(--accent)" />
        <StatCard value={total} label="Documents Processed" color="var(--navy)" />
        <StatCard value={library.length} label="Library Mappings" color="var(--navy)" />
      </div>

      <div style={{display:'flex',gap:16,marginBottom:16,flexWrap:'wrap'}}>
        <div className="card" style={{flex:2,minWidth:280}}>
          <div className="card-header"><div className="card-title">Field Mapping Distribution</div></div>
          <div className="card-body">
            <Bar label="Auto-mapped (Tier 1)" pct={autoRate} color="var(--green)" />
            <Bar label="Reviewed (Tier 2 / 3)" pct={reviewRate} color="var(--amber)" />
            <Bar label="Unknown / Skipped" pct={unknownRate} color="var(--red)" />
          </div>
        </div>
        <div className="card" style={{flex:1,minWidth:180}}>
          <div className="card-header"><div className="card-title">Format Breakdown</div></div>
          <div className="card-body">
            {formatRows.map(function(f) {
              return (
                <div key={f} style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>

      <div className="card">

        <div style={{overflowX:'auto'}}>
          <table className="schema-table">
            <thead><tr>
              <th>Date</th><th>Client</th><th>Format</th>
              <th style={{textAlign:'right'}}>Fields</th>
              <th style={{textAlign:'right'}}>Auto %</th>
              <th>Processed By</th>
            </tr></thead>
            <tbody>
              {recent.map(function(r, i) {
                var a = parseInt(r.FieldsAutoMapped)||0;
                var t = parseInt(r.FieldsTotal)||1;
                var rate = Math.round(a/t*100);
                var rateColor = rate >= 90 ? 'var(--green)' : rate >= 70 ? 'var(--amber)' : 'var(--red)';
                return (
                  <tr key={r.LogId||i}>
                    <td style={{fontSize:12,color:'var(--text-2)'}}>{r.DateProcessed||'—'}</td>
                    <td style={{fontWeight:600}}>{r.ClientId||'Unknown'}</td>
                    <td><span className="badge badge-navy" style={{fontSize:10}}>{r.SourceFormat||'—'}</span></td>
                    <td style={{textAlign:'right'}}>{r.FieldsTotal||0}</td>

                    <td style={{fontSize:12,color:'var(--text-3)'}}>{r.ProcessedBy||'—'}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}
